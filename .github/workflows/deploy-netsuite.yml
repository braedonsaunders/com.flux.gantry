name: Deploy to NetSuite

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'Sync mode'
        required: true
        default: 'ci'
        type: choice
        options:
          - ci
          - all

env:
  # Enable machine-to-machine authentication mode
  SUITECLOUD_CI: "1"
  # Passkey for encrypting credentials (32-100 alphanumeric chars)
  SUITECLOUD_CI_PASSKEY: ${{ secrets.NS_PASSKEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history to detect all deleted files across merged commits

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SuiteCloud CLI
        run: npm install -g @oracle/suitecloud-cli --acceptsuitecloudsdklicense

      - name: Setup private key
        run: |
          echo "${{ secrets.NS_PRIVATE_KEY }}" | base64 -d > /tmp/private.pem
          chmod 600 /tmp/private.pem

      - name: Setup NetSuite authentication
        run: |
          suitecloud account:setup:ci \
            --account ${{ secrets.NS_ACCOUNT_ID }} \
            --authid "github-deploy" \
            --certificateid ${{ secrets.NS_CERTIFICATE_ID }} \
            --privatekeypath /tmp/private.pem

      - name: Deploy to NetSuite
        env:
          # Pass the previous branch state for accurate change detection
          # This ensures all deletions are caught, even across multiple merged commits
          BASE_SHA: ${{ github.event.before }}
        run: |
          # Use 'all' for manual triggers with that option, otherwise 'ci'
          MODE="${{ github.event.inputs.sync_mode || 'ci' }}"
          echo "Sync mode: $MODE"
          echo "Base SHA: $BASE_SHA"
          node scripts/sync.js --$MODE

      - name: Cleanup
        if: always()
        run: rm -f /tmp/private.pem

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Account:** ${{ secrets.NS_ACCOUNT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** ${{ github.event.inputs.sync_mode || 'ci' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
