name: Deploy to NetSuite

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SuiteCloud CLI
        run: npm install -g @oracle/suitecloud-cli

      - name: Setup NetSuite authentication
        run: |
          suitecloud account:savetoken \
            --account ${{ secrets.NS_ACCOUNT_ID }} \
            --authid ${{ secrets.NS_AUTH_ID }} \
            --tokenid ${{ secrets.NS_TOKEN_ID }} \
            --tokensecret ${{ secrets.NS_TOKEN_SECRET }}

      - name: Deploy to NetSuite
        run: suitecloud project:deploy --accountid ${{ secrets.NS_ACCOUNT_ID }}

      - name: Deployment summary
        if: success()
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Account:** ${{ secrets.NS_ACCOUNT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
